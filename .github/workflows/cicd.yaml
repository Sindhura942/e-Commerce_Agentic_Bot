name: Deploy Docker Image to Cloud Run

on:
  push:
    branches: [main]

jobs:
  CI-CD:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔐 Authenticate to GCP via OIDC (Keyless)
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      # ⚙️ Setup gcloud CLI
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # 🐳 Configure Docker for Artifact Registry
      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      # 🏗️ Build & Push Docker Image
      - name: Build and Push Docker Image
        run: |
          IMAGE=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/loom-and-lumen:latest
          
          docker build -t $IMAGE .
          docker push $IMAGE

      # 🚀 Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          IMAGE=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/loom-and-lumen:latest

          gcloud run deploy loom-and-lumen \
            --image=$IMAGE \
            --region=${{ secrets.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="MONGO_URI=${{ secrets.MONGO_URI }},OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }},GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},LOGFIRE_TOKEN=${{ secrets.LOGFIRE_TOKEN }},TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}" \
            --port=8080 \
            --timeout=600 \
            --cpu=1 \
            --memory=1Gi

      # 🔥 Deploy to Firebase Hosting (for clean URL)
      - name: Deploy to Firebase Hosting
        run: |
          npx firebase-tools deploy --only hosting --project e-commerce-493721