name: Deploy Docker Image to Cloud Run

on:
  push:
    branches: [main]

jobs:
  CI-CD:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 🔐 Authenticate to GCP
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # ⚙️ Setup gcloud CLI
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # 🐳 Configure Docker for Artifact Registry
      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      # 🏗️ Build & Push Docker Image
      - name: Build and Push Docker Image
        run: |
          IMAGE=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/luxe-app:latest
          
          docker build -t $IMAGE .
          docker push $IMAGE

      # 🚀 Deploy to Cloud Run
      - name: Deploy to Cloud Run
        run: |
          IMAGE=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPO }}/luxe-app:latest

          gcloud run deploy luxe-app \
            --image=$IMAGE \
            --region=${{ secrets.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --set-env-vars="MONGO_URI=${{ secrets.MONGO_URI }},GROQ_API_KEY=${{ secrets.GROQ_API_KEY }},LOGFIRE_TOKEN=${{ secrets.LOGFIRE_TOKEN }}" \
            --port=8080