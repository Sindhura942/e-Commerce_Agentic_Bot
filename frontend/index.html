<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOOM & LUMEN | Premium Fashion</title>
    <script>
      // Early error reporter to catch module/syntax errors
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        function showErr() {
          const app = document.getElementById('app') || document.body;
          if (app && !document.getElementById('sys-error')) {
            const div = document.createElement('div');
            div.id = 'sys-error';
            div.style = "background:#1a1a1a; color:#f87171; padding:2rem; margin:2rem; border:1px solid #ef4444; border-radius:1rem; font-family:monospace; z-index:99999; position:relative; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.5);";
            div.innerHTML = `
              <h2 style="margin-top:0; display:flex; align-items:center; gap:0.5rem;">⚠️ System Error</h2>
              <p style="margin-bottom:0.5rem;"><strong>Message:</strong> ${msg}</p>
              <p style="margin-bottom:0.5rem;"><strong>File:</strong> ${url ? url.split('/').pop() : 'inline'}:${lineNo}:${columnNo}</p>
              <div style="margin-top:1rem; padding:1rem; background:rgba(0,0,0,0.4); border-radius:0.5rem; overflow:auto; max-height:300px; font-size:0.85rem; border:1px solid rgba(255,255,255,0.05); color: #cbd5e1;">
                ${error?.stack ? error.stack.replace(/</g, '&lt;') : 'No stack trace available.'}
              </div>
              <button onclick="location.reload()" style="background:#ef4444; color:white; border:none; padding:0.75rem 1.5rem; border-radius:0.5rem; cursor:pointer; margin-top:1.5rem; font-weight:bold; transition: opacity 0.2s;" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1">Reload & Retry</button>
            `;
            app.prepend(div);
          }
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', showErr);
        } else {
          showErr();
        }
      };
    </script>
    <link rel="icon" href="https://img.icons8.com/ios-filled/50/ffffff/diamond--v1.png" type="image/png">
    <meta property="og:image" content="https://bolt.new/static/og_default.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./src/style.css">
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
